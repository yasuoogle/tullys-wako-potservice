.form-header::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.35);border-radius:12px}
.form-title{font-size:20px;font-weight:500;margin-bottom:6px;text-align:center;line-height:1.6;position:relative;z-index:1;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.lang-switch{font-size:13px;margin-bottom:1rem;color:#666}
.lang-switch a{color:#1D9E75;text-decoration:underline;cursor:pointer;font-weight:500}
.desc-box{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:0;margin-bottom:1.5rem;font-size:13.5px;line-height:1.8;overflow:hidden}
.desc-header{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.25rem;cursor:pointer;user-select:none}
.desc-header-title{font-size:13px;font-weight:500;color:#666}
.desc-toggle-btn{background:none;border:0.5px solid #ddd;border-radius:6px;padding:3px 10px;font-size:12px;color:#888;cursor:pointer;font-family:inherit;transition:all .15s}
.desc-toggle-btn:hover{background:#f5f5f3;color:#555}
.desc-body{padding:0 1.25rem 1.1rem;transition:all .3s ease}
.desc-body.collapsed{display:none}
.desc-inner{display:flex;gap:1.25rem;align-items:flex-start}
.desc-image{width:140px;min-width:140px;border-radius:8px;object-fit:cover;flex-shrink:0}
.desc-content{flex:1}
.desc-box p{margin-bottom:.7rem}
.desc-box p:last-child{margin-bottom:0}
.desc-box a{color:#1D9E75;text-decoration:underline}
.desc-box .note{color:#666;font-size:12.5px;line-height:1.75}
.desc-box .note p{margin-bottom:.4rem}
.desc-box strong{font-weight:700}
.shop-info{margin-top:.8rem;padding-top:.8rem;border-top:1px solid #e8e7e3;font-size:13px;color:#666;line-height:1.8}
.shop-info a{color:#1D9E75;text-decoration:underline}
.section{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:500;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem}
.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}

<body>
<div class="wrap">
  <div class="form-header">

  <div class="section">

  </div>

  <div class="section">

  <div class="section">
    <div class="section-label" id="lbl-orderer">注文者情報</div>

      </div>
      <div class="field">
        <label id="lbl-name">お名前<span class="req">必須</span></label>

      </div>
    </div>
    <div class="field">
      <label id="lbl-email">メールアドレス<span class="req">必須</span></label>
      <input type="email" id="in-email" placeholder="example@riken.jp" onblur="validateField('in-email','err-email')">
    <div class="field-error" id="err-email">メールアドレスを入力してください。</div>
    </div>

</div>

const drinkOptions = ['ホットコーヒー','アイスコーヒー','ホットティー','アイスティー'];
const drinkOptionsEn = ['Hot Coffee','Iced Coffee','Hot Tea','Iced Tea'];

function buildDrinkSelect(lang, selectedVal='') {
  const opts = lang==='en' ? drinkOptionsEn : drinkOptions;
  const ph = lang==='en' ? 'Select drink' : '種類を選ぶ';
  let html = `<option value="">${ph}</option>`;
  opts.forEach((o,i) => {
    const val = drinkOptions[i];
    html += `<option value="${val}"${selectedVal===val?' selected':''}>${o}</option>`;
  });
  return html;
}

function buildQtySelect(selectedVal='') {
  let html = '<option value="">本数</option>';
  for(let i=1;i<=10;i++) html += `<option value="${i}"${selectedVal==i?' selected':''}>${i}</option>`;
  return html;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function appendDrinkToContent(blockId) {
  const sel = document.getElementById('drink-sel-' + blockId);
  const qty = document.getElementById('drink-qty-' + blockId);
  const ta = document.getElementById('ta-content-' + blockId);
  if(!sel||!qty||!ta) return;
  const drink = sel.value;
  const qtyVal = qty.value;
  if(!drink || !qtyVal) {
    alert(currentLang==='ja'?'種類と本数を選んでください。':'Please select a drink and quantity.');
    return;
  }
  const line = drink + '×' + qtyVal;
  ta.value = ta.value ? ta.value + '\n' + line : line;
  // reset selects
  sel.value = '';
  qty.value = '';
  // clear validation error
  const errEl = document.getElementById('err-content-' + blockId);
  if(errEl){errEl.classList.remove('visible');ta.classList.remove('error');}
  autoResize(ta);
}

function addDelivery(){
  dc++;
  const id='del'+dc;
  const c=content[currentLang];

  // Get previous block values to prefill
  const blocks=document.querySelectorAll('.delivery-block');
  let prevDate='', prevTime='', prevContent='';
  if(blocks.length>0){
    const prev=blocks[blocks.length-1];
    const prevDateInput=prev.querySelector('input[type=date]');
    const prevTimeSelect=prev.querySelector('select');
    const prevTextarea=prev.querySelector('textarea');
    if(prevDateInput)prevDate=prevDateInput.value;
    if(prevTimeSelect)prevTime=prevTimeSelect.value;
    // prevContent intentionally not copied
  }

  const div=document.createElement('div');
  div.className='delivery-block';
  div.id=id;
  div.innerHTML=`
    <button class="remove-btn" onclick="removeDel('${id}')" title="削除">×</button>
    <div class="field" style="margin-bottom:10px">
      <label style="font-size:13px">${c.dateLabel}<span style="color:#D85A30;font-size:11px;margin-left:3px">${c.req}</span></label>
      <div class="datetime-row">
        <input type="date" onblur="validateDeliveryField(this,'date','${id}')">
        <select onblur="validateDeliveryField(this,'time','${id}')">${buildTimeOptions(currentLang)}</select>
      </div>
      <div class="field-error" id="err-datetime-${id}">${c.errDatetime}</div>
    </div>
    <div class="field" style="margin:0">
      <label style="font-size:13px">${c.contentLabel}<span style="color:#D85A30;font-size:11px;margin-left:3px">${c.req}</span></label>
      <div class="drink-selector" id="drink-selector-${id}">
        <select class="drink-select" id="drink-sel-${id}"></select>
        <span class="drink-x">×</span>
        <select class="drink-qty" id="drink-qty-${id}"></select>
        <button class="drink-add-btn" onclick="appendDrinkToContent('${id}');return false;">追加 ▼</button>
      </div>
      <textarea placeholder="${c.contentPlaceholder}" style="min-height:60px" onblur="validateDeliveryField(this,'content','${id}')" id="ta-content-${id}" class="ta-auto-resize" oninput="autoResize(this)"></textarea>
      <div class="field-error" id="err-content-${id}">${c.errContent}</div>
    </div>`;
  document.getElementById('delivery-list').appendChild(div);
  // Populate drink selects after DOM insertion
  const drinkSel = document.getElementById('drink-sel-' + id);
  const qtySelEl = document.getElementById('drink-qty-' + id);
  if(drinkSel) drinkSel.innerHTML = buildDrinkSelect(currentLang);
  if(qtySelEl) qtySelEl.innerHTML = buildQtySelect();

  // Set previous values after appending to DOM
  if(prevDate||prevTime||prevContent){
    const newBlock=document.getElementById(id);
    if(prevDate)newBlock.querySelector('input[type=date]').value=prevDate;
    if(prevTime){
      const sel=newBlock.querySelector('select');
      sel.value=prevTime;
    }
    // content left empty intentionally
  }
}
function validateDeliveryField(el,type,id){
  const block=document.getElementById(id);
  if(!block)return;
  const dateInput=block.querySelector('input[type=date]');
  const timeSelect=block.querySelector('select');
  const textarea=block.querySelector('textarea');
  if(type==='date'||type==='time'){
    const hasDate=dateInput&&dateInput.value;
    const hasTime=timeSelect&&timeSelect.value;
    const errEl=document.getElementById('err-datetime-'+id);
    if(errEl){
      if(!hasDate||!hasTime){errEl.classList.add('visible');if(dateInput)dateInput.classList.add('error');if(timeSelect)timeSelect.classList.add('error');}
      else{errEl.classList.remove('visible');if(dateInput)dateInput.classList.remove('error');if(timeSelect)timeSelect.classList.remove('error');}
    }
  }
  if(type==='content'){
    const errEl=document.getElementById('err-content-'+id);
    if(errEl){
      if(!textarea||!textarea.value.trim()){errEl.classList.add('visible');if(textarea)textarea.classList.add('error');}
      else{errEl.classList.remove('visible');if(textarea)textarea.classList.remove('error');}
    }
  }
}

// EmailJS init
window.addEventListener('load', function(){
  emailjs.init('YX7jQxY4iebuplDfH');
});

document.getElementById('btn-submit').addEventListener('click', async function(){
  const c=content[currentLang];
  const email=document.getElementById('in-email').value.trim();
  const dept=document.getElementById('in-dept').value.trim();
  const name=document.getElementById('in-name').value.trim();
  const tel=document.getElementById('in-tel').value.trim();
  const food=document.getElementById('ta-food').value.trim();
  const memo=document.getElementById('ta-memo').value.trim();

  const p1checked=document.getElementById('p1').checked;
  const p2checked=document.getElementById('p2').checked;
  let hasError=false;

  // Validate basic fields
  ['in-dept','in-name','in-email','in-tel'].forEach(id=>{
    const errMap={'in-dept':'err-dept','in-name':'err-name','in-email':'err-email','in-tel':'err-tel'};
    const val=document.getElementById(id).value.trim();
    const errEl=document.getElementById(errMap[id]);
    if(!val){if(errEl)errEl.classList.add('visible');document.getElementById(id).classList.add('error');hasError=true;}
    else{if(errEl)errEl.classList.remove('visible');document.getElementById(id).classList.remove('error');}
  });

  // Validate delivery blocks
  const blocks=document.querySelectorAll('.delivery-block');
  blocks.forEach(block=>{
    const id=block.id;
    const dateInput=block.querySelector('input[type=date]');
    const timeSelect=block.querySelector('select');
    const textarea=block.querySelector('textarea');
    const hasDate=dateInput&&dateInput.value;
    const hasTime=timeSelect&&timeSelect.value;
    const hasContent=textarea&&textarea.value.trim();
    const dtErr=document.getElementById('err-datetime-'+id);
    const ctErr=document.getElementById('err-content-'+id);
    if(!hasDate||!hasTime){if(dtErr)dtErr.classList.add('visible');if(dateInput)dateInput.classList.add('error');if(timeSelect)timeSelect.classList.add('error');hasError=true;}
    else{if(dtErr)dtErr.classList.remove('visible');if(dateInput)dateInput.classList.remove('error');if(timeSelect)timeSelect.classList.remove('error');}
    if(!hasContent){if(ctErr)ctErr.classList.add('visible');if(textarea)textarea.classList.add('error');hasError=true;}
    else{if(ctErr)ctErr.classList.remove('visible');if(textarea)textarea.classList.remove('error');}
  });

  // Validate payment
  const payErrEl=document.getElementById('err-payment');
  if(!p1checked&&!p2checked){if(payErrEl)payErrEl.classList.add('visible');hasError=true;}
  else{if(payErrEl)payErrEl.classList.remove('visible');}

  // Validate invoice fields if invoice payment selected
  if(p1checked){
    const in1=document.getElementById('in1').checked;
    const in2=document.getElementById('in2').checked;
    const invNameErr=document.getElementById('err-inv-name');
    if(!in1&&!in2){if(invNameErr)invNameErr.classList.add('visible');hasError=true;}
    else{if(invNameErr)invNameErr.classList.remove('visible');}
    if(in2){
      const otherVal=document.getElementById('in-inv-other').value.trim();
      const invOtherErr=document.getElementById('err-inv-other');
      const invOtherInput=document.getElementById('in-inv-other');
      if(!otherVal){if(invOtherErr)invOtherErr.classList.add('visible');invOtherInput.classList.add('error');hasError=true;}
      else{if(invOtherErr)invOtherErr.classList.remove('visible');invOtherInput.classList.remove('error');}
    }
    const inv1=document.getElementById('inv1').checked;
    const inv2=document.getElementById('inv2').checked;
    const invFmtErr=document.getElementById('err-inv-format');
    if(!inv1&&!inv2){if(invFmtErr)invFmtErr.classList.add('visible');hasError=true;}
    else{if(invFmtErr)invFmtErr.classList.remove('visible');}
    if(inv2){
      const fmtVal=document.getElementById('in-inv-format-other').value.trim();
      const invFmtOtherErr=document.getElementById('err-inv-format-other');
      const invFmtOtherInput=document.getElementById('in-inv-format-other');
      if(!fmtVal){if(invFmtOtherErr)invFmtOtherErr.classList.add('visible');invFmtOtherInput.classList.add('error');hasError=true;}
      else{if(invFmtOtherErr)invFmtOtherErr.classList.remove('visible');invFmtOtherInput.classList.remove('error');}
    }
  }

  if(hasError){
    document.querySelector('.error')||window.scrollTo({top:0,behavior:'smooth'});
    const firstErr=document.querySelector('.field-error.visible');
    if(firstErr)firstErr.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  // Collect delivery info
  let orderDetails='';
  document.querySelectorAll('.delivery-block').forEach((block,i)=>{
    const dateInput=block.querySelector('input[type=date]');
    const timeSelect=block.querySelector('select');
    const contentTa=block.querySelector('textarea');
    const date=dateInput?dateInput.value:'';
    const time=timeSelect?timeSelect.value:'';
    const detail=contentTa?contentTa.value:'';
    if(date||detail) orderDetails+=`[${i+1}] ${date} ${time}\n${detail}\n`;
  });

  // Payment info
  const p1=document.getElementById('p1').checked;
  const p2=document.getElementById('p2').checked;
  let payment=p1?(currentLang==='ja'?'請求書払い（後払い）':'Invoice (pay later)'):p2?(currentLang==='ja'?'店頭払い':'Pay at store'):'';
  const invName=document.getElementById('in1').checked?'理化学研究所':document.getElementById('in2').checked?document.getElementById('in-inv-other').value:'';
  const invFormat=document.getElementById('inv1').checked?'PDF（メール）':document.getElementById('inv2').checked?document.getElementById('in-inv-format-other').value:'';

  const params={
    user_name:name,
    user_email:email,
    dept:dept,
    tel:tel,
    order_details:orderDetails||'（未入力）',
    food:food||'（なし）',
    payment:payment||'（未選択）',
    invoice_name:invName||'（なし）',
    invoice_format:invFormat||'（なし）',
    memo:memo||'（なし）'
  };

  const btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent=currentLang==='ja'?'送信中...':'Sending...';

  try {
    // Send confirmation to customer
    await emailjs.send('service_10si8uf','template_hhcxk28',params);
    // Send notification to store
    await emailjs.send('service_10si8uf','template_dojv4p9',params);

    // Submit to Formspree
    await fetch('https://formspree.io/f/mpqyogal',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(params)
    });

    // Save to Google Spreadsheet
    await fetch('https://script.google.com/macros/s/AKfycbxtsW2oQCRkRCR62ZVTKzCZ82LnxCnP0bHiEvtrkA6pPltkGxm9hSjNCVBVcnDpvBe2mA/exec',{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(params)
    });

    // Save orderer info if checkbox checked
    if(document.getElementById('save-info').checked){
      saveOrdrerInfo();
    }
    // Show success screen
    const sc=content[currentLang];
    document.getElementById('success-title').innerHTML=sc.title;
    document.getElementById('success-msg').innerHTML=sc.successMsg;
    document.getElementById('btn-reorder').textContent=sc.reorderBtn;
    document.getElementById('btn-close').textContent=sc.closeBtn;
    document.querySelector('.wrap').style.display='none';
    document.getElementById('success-screen').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  } catch(err){
    console.error(err);
    alert(currentLang==='ja'?'送信に失敗しました。時間をおいて再度お試しいただくか、直接お電話ください。（048-451-0153）':'Submission failed. Please try again or call us at 048-451-0153.');
    btn.disabled=false;
    btn.textContent=c.submit;
  }
});
</script>
