<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーヒーポットサービス 注文フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#1a1a1a;padding:2rem 1rem}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 0}
.form-title{font-size:20px;font-weight:500;margin-bottom:6px;text-align:center;line-height:1.6}
.lang-switch{font-size:13px;margin-bottom:1rem;color:#666}
.lang-switch a{color:#1D9E75;text-decoration:underline;cursor:pointer;font-weight:500}
.desc-box{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:2rem;font-size:13.5px;line-height:1.8}
.desc-inner{display:flex;gap:1.25rem;align-items:flex-start}
.desc-image{width:140px;min-width:140px;border-radius:8px;object-fit:cover;flex-shrink:0}
.desc-content{flex:1}
.desc-box p{margin-bottom:.7rem}
.desc-box p:last-child{margin-bottom:0}
.desc-box a{color:#1D9E75;text-decoration:underline}
.desc-box .note{color:#666;font-size:12.5px;line-height:1.75}
.desc-box .note p{margin-bottom:.4rem}
.desc-box strong{font-weight:500}
.shop-info{margin-top:.8rem;padding-top:.8rem;border-top:1px solid #e8e7e3;font-size:13px;color:#666;line-height:1.8}
.shop-info a{color:#1D9E75;text-decoration:underline}
.section{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:500;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem}
.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
label{display:block;font-size:14px;font-weight:500;margin-bottom:5px}
.hint{font-size:12px;color:#888;margin-top:3px}
.req{color:#D85A30;font-size:12px;margin-left:4px}
input[type=text],input[type=email],input[type=tel],input[type=date],select,textarea{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.12)}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.datetime-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.delivery-block{border:1px solid #e8e7e3;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.remove-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;line-height:1;padding:0}
.remove-btn:hover{color:#333}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#666;font-family:inherit;margin-top:4px;transition:background .15s}
.add-btn:hover{background:#f5f5f3}
.radio-option{display:none}
.radio-label{display:inline-block;padding:7px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.radio-label:hover{background:#f5f5f3}
.radio-option:checked+.radio-label{border:1.5px solid #1D9E75;color:#0F6E56;background:#E1F5EE;font-weight:500}
.cb-option{display:none}
.cb-label{display:inline-block;padding:7px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.cb-label:hover{background:#f5f5f3}
.cb-option:checked+.cb-label{border:1.5px solid #1D9E75;color:#0F6E56;background:#E1F5EE;font-weight:500}
.invoice-fields{display:none;margin-top:1.1rem;padding-top:1.1rem;border-top:1px solid #e8e7e3}
.submit-btn{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:.5rem}
.submit-btn:hover{opacity:.88}
.field-error{font-size:12px;color:#D85A30;margin-top:4px;display:none}
.field-error.visible{display:block}
input.error,select.error,textarea.error{border-color:#D85A30;box-shadow:0 0 0 2px rgba(216,90,48,.12)}
@media(max-width:520px){.desc-inner{flex-direction:column}.desc-image{width:100%;min-width:unset;max-height:200px}.grid2{grid-template-columns:1fr}.datetime-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="form-title" id="form-title">タリーズコーヒー和光理化学研究所店<br>コーヒーポットサービス 注文フォーム</div>
  <div class="lang-switch" id="lang-link"><a onclick="setLang('en')">English</a></div>

  <div class="desc-box" id="desc-box-wrap">
    <div class="desc-inner">
      <div class="desc-content" id="desc-content"></div>
      <img id="desc-img" class="desc-image" src="" alt="Tully's Coffee Pot Service">
    </div>
  </div>

  <div class="section">
    <div class="section-label" id="lbl-order">ご注文情報</div>
    <div id="delivery-list"></div>
    <button class="add-btn" onclick="addDelivery()" id="btn-add">＋ 受渡を追加</button>
  </div>

  <div class="section">
    <div class="section-label" id="lbl-food">フード</div>
    <div class="field">
      <label id="lbl-food-content">フードの内容</label>
      <textarea id="ta-food" placeholder="ご希望のフードがあればご記入ください（例：サンドイッチ×10、マフィン×5 など）" style="min-height:70px"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-label" id="lbl-orderer">注文者情報</div>
    <div class="grid2">
      <div class="field">
        <label id="lbl-dept">部署名<span class="req">必須</span></label>
        <input type="text" id="in-dept" placeholder="例：営業部" onblur="validateField('in-dept','err-dept')">
      <div class="field-error" id="err-dept">部署名を入力してください。</div>
      </div>
      <div class="field">
        <label id="lbl-name">お名前<span class="req">必須</span></label>
        <input type="text" id="in-name" placeholder="例：山田 太郎" onblur="validateField('in-name','err-name')">
      <div class="field-error" id="err-name">お名前を入力してください。</div>
      </div>
    </div>
    <div class="field">
      <label id="lbl-email">メールアドレス<span class="req">必須</span></label>
      <input type="email" id="in-email" placeholder="example@riken.jp" onblur="validateField('in-email','err-email')">
    <div class="field-error" id="err-email">メールアドレスを入力してください。</div>
    </div>
    <div class="field">
      <label id="lbl-tel">緊急連絡先<span class="req">必須</span></label>
      <input type="tel" id="in-tel" placeholder="例：090-0000-0000" onblur="validateField('in-tel','err-tel')">
      <div class="field-error" id="err-tel">緊急連絡先を入力してください。</div>
      <div class="hint" id="hint-tel">当日ご連絡可能な電話番号をご入力ください。</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label" id="lbl-payment-section">お支払い情報</div>
    <div class="field" style="margin-bottom:0">
      <label id="lbl-payment">お支払い方法<span class="req">必須</span></label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        <input type="radio" name="payment" id="p1" class="radio-option" onchange="toggleInvoiceFields()">
        <label for="p1" class="radio-label" id="lbl-p1">請求書払い（後払い）</label>
        <input type="radio" name="payment" id="p2" class="radio-option" onchange="toggleInvoiceFields()">
        <label for="p2" class="radio-label" id="lbl-p2">店頭払い</label>
      </div>
    </div>
    <div class="field-error" id="err-payment">お支払い方法を選択してください。</div>
    <div class="invoice-fields" id="invoice-fields">
      <div class="field">
        <label id="lbl-inv-name">請求書宛名</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
          <input type="radio" name="invoice_name" id="in1" class="radio-option" onchange="toggleInvoiceName()">
          <label for="in1" class="radio-label">理化学研究所</label>
          <input type="radio" name="invoice_name" id="in2" class="radio-option" onchange="toggleInvoiceName()">
          <label for="in2" class="radio-label" id="lbl-inv-other">その他</label>
        </div>
        <div id="invoice-name-other" style="display:none">
          <input type="text" id="in-inv-other" placeholder="宛名をご記入ください" style="margin-top:8px">
        </div>
      </div>
      <div class="field">
        <label id="lbl-inv-format">請求書発行形式</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
          <input type="checkbox" id="inv1" class="cb-option">
          <label for="inv1" class="cb-label">PDF（メール）</label>
          <input type="checkbox" id="inv2" class="cb-option" onchange="toggleInvOther()">
          <label for="inv2" class="cb-label" id="lbl-inv-format-other">その他</label>
        </div>
        <div id="inv-other-field" style="display:none">
          <input type="text" id="in-inv-format-other" placeholder="発行形式をご記入ください" style="margin-top:8px">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label" id="lbl-memo">通信欄</div>
    <div class="field">
      <label id="lbl-memo-content">その他・備考</label>
      <textarea id="ta-memo" placeholder="特記事項などがあればご自由にご記入ください。" style="min-height:80px"></textarea>
    </div>
  </div>

  <button class="submit-btn" id="btn-submit">送信する</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const timeSlots=['8:30','8:45','9:00','9:15','9:30','9:45','10:00','10:15','10:30','10:45','11:00','11:15','11:30','11:45','12:00','12:15','12:30','12:45','13:00','13:15','13:30','13:45','14:00','14:15','14:30','14:45','15:00','15:15','15:30','15:45','16:00','16:15','16:30','16:45','17:00','17:15','17:30','17:45','18:00','18:15','18:30'];
function buildTimeOptions(lang){
  const ph=lang==='en'?'Select time':'時刻を選択';
  return`<option value="">${ph}</option>`+timeSlots.map(t=>`<option value="${t}">${t}</option>`).join('');
}
let currentLang='ja';
let dc=0;

const imgSrc='pot_image.jpg';

const content={
  ja:{
    title:'タリーズコーヒー和光理化学研究所店<br>コーヒーポットサービス 注文フォーム',
    langLink:'<a onclick="setLang(\'en\')">English</a>',
    imgAlt:'タリーズコーヒー ポットサービス',
    desc:`<p>タリーズコーヒーの美味しさを、人の集まるさまざまなシーンで。淹れたてのコーヒーや紅茶のショートサイズ約10杯分をポットに入れてご提供いたします。</p>
<p><strong>☕ ポットサービス 対象商品</strong><br>ホットコーヒー／アイスコーヒー／ホットティー／アイスティー</p>
<p><strong>💴 ポットサービス 価格</strong><br>店舗渡し ポット1本 ： 3,200円（税込）</p>
<div class="note">
<p>※１ポットにつきカップ／フタ／スリーブ／シュガー／ポーション／マドラー／紙ナプキン（各10個）が付属</p>
<p>※店頭でのお渡しのみで、配達は承っておりません。ご不便おかけいたしますが何卒ご了承のほどよろしくお願いいたします。</p>
<p>※フード・スイーツ類などの同時注文も承ります。内容につきましては<a href="https://www.tullys.co.jp" target="_blank">タリーズ本部Webサイト</a>をご参照の上、店舗に直接お問い合わせください。</p>
<p>※端数（25杯など）のご注文も可能です。その場合、端数の杯数は店頭価格、Sサイズ1杯370円（税込）x 杯数で計算させていただきます。</p>
<p>※準備の都合上、量の多いご注文（ポット５本〜）の場合は、2,3日前までにご連絡いただけると幸いです。当日のご注文につきましても、できる限りの対応をさせていただきます。</p>
</div>
<p style="margin-top:.7rem"><strong>🏡 営業時間</strong>　平日8:30-18:30／土11:30-15:30／日祝休<br><span style="font-size:12.5px;color:#888">※早朝、夜など営業時間外のご注文は応相談となります。</span></p>
<div class="shop-info">タリーズコーヒー和光理化学研究所店<br>phone: 048-451-0153　email: <a href="mailto:manager@tullys-wako.jp">manager@tullys-wako.jp</a><br>Website: <a href="https://www.tullys-wako.jp" target="_blank">https://www.tullys-wako.jp</a></div>`,
    orderSection:'注文情報',addBtn:'＋ 受渡情報を追加',dateLabel:'受渡日時',contentLabel:'受渡内容',
    contentPlaceholder:'ご注文内容をご記入ください（例：ホットコーヒーｘ２　アイスコーヒーｘ２など）',
    foodSection:'フード',foodContent:'フードの内容',foodPlaceholder:'ご希望のフードがあればご記入ください（例：サンドイッチ×10、マフィン×5 など）',
    ordererSection:'注文者情報',dept:'部署名',deptPh:'例：◯◯研究室',name:'お名前',namePh:'例：山田 太郎',
    email:'メールアドレス',tel:'緊急連絡先',telPh:'例：090-0000-0000',telHint:'当日ご連絡可能な電話番号をご入力ください。',
    paymentSection:'お支払い情報',paymentLabel:'お支払い方法',p1:'請求書払い（後払い）',p2:'店頭払い',
    invName:'請求書宛名',invOther:'その他',invOtherPh:'宛名をご記入ください',
    invFormat:'請求書発行形式',invFormatOther:'その他',invFormatOtherPh:'発行形式をご記入ください',
    memoSection:'通信欄',memoLabel:'その他・備考',memoPh:'特記事項などがあればご自由にご記入ください。',
    submit:'送信する',req:'必須'
  },
  en:{
    title:'Tully\'s Coffee Wako RIKEN Store<br>Coffee Pot Service Order Form',
    langLink:'<a onclick="setLang(\'ja\')">日本語</a>',
    imgAlt:"Tully's Coffee Pot Service",
    desc:`<p>Enjoy Tully's Coffee at your gatherings and events. We serve freshly brewed coffee or tea — equivalent to about 10 short-size cups — in a pot.</p>
<p><strong>☕ Available Items</strong><br>Hot Coffee / Iced Coffee / Hot Tea / Iced Tea</p>
<p><strong>💴 Pricing</strong><br>In-store pickup: ¥3,200 per pot (tax included)</p>
<div class="note">
<p>* Each pot includes cups, lids, sleeves, sugar, creamer, stirrers, and paper napkins (10 of each).</p>
<p>* In-store pickup only — delivery is not available. We apologize for any inconvenience.</p>
<p>* Food and sweets can be ordered at the same time. Please refer to the <a href="https://www.tullys.co.jp" target="_blank">Tully's website</a> for available items and contact the store directly.</p>
<p>* Partial orders (e.g., 25 cups) are also accepted. Cups beyond full pots will be charged at the regular price of ¥370/cup (tax included).</p>
<p>* For large orders (5+ pots), we kindly ask for 2–3 days' notice. We will do our best to accommodate same-day orders as well.</p>
</div>
<p style="margin-top:.7rem"><strong>🏡 Hours</strong>　Weekdays 8:30–18:30 / Sat 11:30–15:30 / Sun & Holidays closed<br><span style="font-size:12.5px;color:#888">* Orders outside business hours are available upon request.</span></p>
<div class="shop-info">Tully's Coffee Wako RIKEN Store<br>phone: 048-451-0153　email: <a href="mailto:manager@tullys-wako.jp">manager@tullys-wako.jp</a><br>Website: <a href="https://www.tullys-wako.jp" target="_blank">https://www.tullys-wako.jp</a></div>`,
    orderSection:'Order Information',addBtn:'＋ Add delivery',dateLabel:'Delivery date & time',contentLabel:'Order contents',
    contentPlaceholder:'e.g. Regular coffee × 2 pots, cups × 20',
    foodSection:'Food',foodContent:'Food items',foodPlaceholder:'e.g. Sandwiches × 10, Muffins × 5',
    ordererSection:'Orderer Information',dept:'Department',deptPh:'e.g. Sales',name:'Name',namePh:'e.g. Taro Yamada',
    email:'Email address',tel:'Emergency contact',telPh:'e.g. 090-0000-0000',telHint:'Please provide a phone number reachable on the day.',
    paymentSection:'Payment',paymentLabel:'Payment method',p1:'Invoice (pay later)',p2:'Pay at store',
    invName:'Invoice recipient',invOther:'Other',invOtherPh:'Enter recipient name',
    invFormat:'Invoice format',invFormatOther:'Other',invFormatOtherPh:'Describe the format',
    memoSection:'Notes',memoLabel:'Additional notes',memoPh:'Feel free to add any special requests or notes.',
    submit:'Submit',req:'Required'
  }
};

function setLang(lang){
  currentLang=lang;
  const c=content[lang];
  document.getElementById('form-title').innerHTML=c.title;
  document.getElementById('lang-link').innerHTML=c.langLink;
  document.getElementById('desc-content').innerHTML=c.desc;
  document.getElementById('desc-img').alt=c.imgAlt;
  document.getElementById('lbl-order').textContent=c.orderSection;
  document.getElementById('btn-add').textContent=c.addBtn;
  document.getElementById('lbl-food').textContent=c.foodSection;
  document.getElementById('lbl-food-content').textContent=c.foodContent;
  document.getElementById('ta-food').placeholder=c.foodPlaceholder;
  document.getElementById('lbl-orderer').textContent=c.ordererSection;
  document.getElementById('lbl-dept').innerHTML=c.dept+`<span class="req">${c.req}</span>`;
  document.getElementById('in-dept').placeholder=c.deptPh;
  document.getElementById('lbl-name').innerHTML=c.name+`<span class="req">${c.req}</span>`;
  document.getElementById('in-name').placeholder=c.namePh;
  document.getElementById('lbl-email').innerHTML=c.email+`<span class="req">${c.req}</span>`;
  document.getElementById('lbl-tel').innerHTML=c.tel+`<span class="req">${c.req}</span>`;
  document.getElementById('in-tel').placeholder=c.telPh;
  document.getElementById('hint-tel').textContent=c.telHint;
  document.getElementById('lbl-payment-section').textContent=c.paymentSection;
  document.getElementById('lbl-payment').innerHTML=c.paymentLabel+`<span class="req">${c.req}</span>`;
  document.getElementById('lbl-p1').textContent=c.p1;
  document.getElementById('lbl-p2').textContent=c.p2;
  document.getElementById('lbl-inv-name').textContent=c.invName;
  document.getElementById('lbl-inv-other').textContent=c.invOther;
  document.getElementById('in-inv-other').placeholder=c.invOtherPh;
  document.getElementById('lbl-inv-format').textContent=c.invFormat;
  document.getElementById('lbl-inv-format-other').textContent=c.invFormatOther;
  document.getElementById('in-inv-format-other').placeholder=c.invFormatOtherPh;
  document.getElementById('lbl-memo').textContent=c.memoSection;
  document.getElementById('lbl-memo-content').textContent=c.memoLabel;
  document.getElementById('ta-memo').placeholder=c.memoPh;
  document.getElementById('btn-submit').textContent=c.submit;
  document.querySelectorAll('.delivery-block').forEach(block=>{
    const labels=block.querySelectorAll('label');
    if(labels[0])labels[0].innerHTML=c.dateLabel+`<span style="color:#D85A30;font-size:11px;margin-left:3px">${c.req}</span>`;
    if(labels[1])labels[1].textContent=c.contentLabel;
    const ta=block.querySelector('textarea');
    if(ta)ta.placeholder=c.contentPlaceholder;
    const sel=block.querySelector('select');
    if(sel){const cur=sel.value;sel.innerHTML=buildTimeOptions(lang);sel.value=cur;}
  });
}
function addDelivery(){
  dc++;
  const id='del'+dc;
  const c=content[currentLang];
  const div=document.createElement('div');
  div.className='delivery-block';
  div.id=id;
  div.innerHTML=`
    <button class="remove-btn" onclick="removeDel('${id}')" title="削除">×</button>
    <div class="field" style="margin-bottom:10px">
      <label style="font-size:13px">${c.dateLabel}<span style="color:#D85A30;font-size:11px;margin-left:3px">${c.req}</span></label>
      <div class="datetime-row">
        <input type="date" onblur="validateDeliveryField(this,'date','${id}')">
        <select onblur="validateDeliveryField(this,'time','${id}')">${buildTimeOptions(currentLang)}</select>
      </div>
      <div class="field-error" id="err-datetime-${id}">${currentLang==='ja'?'日付と時刻を選択してください。':'Please select a date and time.'}</div>
    </div>
    <div class="field" style="margin:0">
      <label style="font-size:13px">${c.contentLabel}</label>
      <textarea placeholder="${c.contentPlaceholder}" style="min-height:60px" onblur="validateDeliveryField(this,'content','${id}')"></textarea>
      <div class="field-error" id="err-content-${id}">${currentLang==='ja'?'受渡内容を入力してください。':'Please enter order contents.'}</div>
    </div>`;
  document.getElementById('delivery-list').appendChild(div);
}
function validateDeliveryField(el,type,id){
  const block=document.getElementById(id);
  if(!block)return;
  const dateInput=block.querySelector('input[type=date]');
  const timeSelect=block.querySelector('select');
  const textarea=block.querySelector('textarea');
  if(type==='date'||type==='time'){
    const hasDate=dateInput&&dateInput.value;
    const hasTime=timeSelect&&timeSelect.value;
    const errEl=document.getElementById('err-datetime-'+id);
    if(errEl){
      if(!hasDate||!hasTime){errEl.classList.add('visible');if(dateInput)dateInput.classList.add('error');if(timeSelect)timeSelect.classList.add('error');}
      else{errEl.classList.remove('visible');if(dateInput)dateInput.classList.remove('error');if(timeSelect)timeSelect.classList.remove('error');}
    }
  }
  if(type==='content'){
    const errEl=document.getElementById('err-content-'+id);
    if(errEl){
      if(!textarea||!textarea.value.trim()){errEl.classList.add('visible');if(textarea)textarea.classList.add('error');}
      else{errEl.classList.remove('visible');if(textarea)textarea.classList.remove('error');}
    }
  }
}
function removeDel(id){const el=document.getElementById(id);if(el)el.remove();}
function validateField(inputId,errId){
  const val=document.getElementById(inputId).value.trim();
  const errEl=document.getElementById(errId);
  if(!errEl)return;
  if(!val){errEl.classList.add('visible');document.getElementById(inputId).classList.add('error');}
  else{errEl.classList.remove('visible');document.getElementById(inputId).classList.remove('error');}
}
function toggleInvoiceFields(){
  const isInvoice=document.getElementById('p1').checked;
  document.getElementById('invoice-fields').style.display=isInvoice?'block':'none';
  if(!isInvoice){
    document.querySelectorAll('input[name="invoice_name"]').forEach(r=>r.checked=false);
    document.getElementById('invoice-name-other').style.display='none';
    document.getElementById('inv1').checked=false;
    document.getElementById('inv2').checked=false;
    document.getElementById('inv-other-field').style.display='none';
  }
}
function toggleInvoiceName(){
  document.getElementById('invoice-name-other').style.display=document.getElementById('in2').checked?'block':'none';
}
function toggleInvOther(){
  document.getElementById('inv-other-field').style.display=document.getElementById('inv2').checked?'block':'none';
}

addDelivery();

// EmailJS init
window.addEventListener('load', function(){
  emailjs.init('YX7jQxY4iebuplDfH');
});

document.getElementById('btn-submit').addEventListener('click', async function(){
  const c=content[currentLang];
  const email=document.getElementById('in-email').value.trim();
  const dept=document.getElementById('in-dept').value.trim();
  const name=document.getElementById('in-name').value.trim();
  const tel=document.getElementById('in-tel').value.trim();
  const food=document.getElementById('ta-food').value.trim();
  const memo=document.getElementById('ta-memo').value.trim();

  const p1checked=document.getElementById('p1').checked;
  const p2checked=document.getElementById('p2').checked;
  let hasError=false;

  // Validate basic fields
  ['in-dept','in-name','in-email','in-tel'].forEach(id=>{
    const errMap={'in-dept':'err-dept','in-name':'err-name','in-email':'err-email','in-tel':'err-tel'};
    const val=document.getElementById(id).value.trim();
    const errEl=document.getElementById(errMap[id]);
    if(!val){if(errEl)errEl.classList.add('visible');document.getElementById(id).classList.add('error');hasError=true;}
    else{if(errEl)errEl.classList.remove('visible');document.getElementById(id).classList.remove('error');}
  });

  // Validate delivery blocks
  const blocks=document.querySelectorAll('.delivery-block');
  blocks.forEach(block=>{
    const id=block.id;
    const dateInput=block.querySelector('input[type=date]');
    const timeSelect=block.querySelector('select');
    const textarea=block.querySelector('textarea');
    const hasDate=dateInput&&dateInput.value;
    const hasTime=timeSelect&&timeSelect.value;
    const hasContent=textarea&&textarea.value.trim();
    const dtErr=document.getElementById('err-datetime-'+id);
    const ctErr=document.getElementById('err-content-'+id);
    if(!hasDate||!hasTime){if(dtErr)dtErr.classList.add('visible');if(dateInput)dateInput.classList.add('error');if(timeSelect)timeSelect.classList.add('error');hasError=true;}
    else{if(dtErr)dtErr.classList.remove('visible');if(dateInput)dateInput.classList.remove('error');if(timeSelect)timeSelect.classList.remove('error');}
    if(!hasContent){if(ctErr)ctErr.classList.add('visible');if(textarea)textarea.classList.add('error');hasError=true;}
    else{if(ctErr)ctErr.classList.remove('visible');if(textarea)textarea.classList.remove('error');}
  });

  // Validate payment
  const payErrEl=document.getElementById('err-payment');
  if(!p1checked&&!p2checked){if(payErrEl)payErrEl.classList.add('visible');hasError=true;}
  else{if(payErrEl)payErrEl.classList.remove('visible');}

  if(hasError){
    document.querySelector('.error')||window.scrollTo({top:0,behavior:'smooth'});
    const firstErr=document.querySelector('.field-error.visible');
    if(firstErr)firstErr.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  // Collect delivery info
  let orderDetails='';
  document.querySelectorAll('.delivery-block').forEach((block,i)=>{
    const inputs=block.querySelectorAll('input[type=date],select,textarea');
    const date=inputs[0]?inputs[0].value:'';
    const time=inputs[1]?inputs[1].value:'';
    const detail=inputs[2]?inputs[2].value:'';
    if(date||detail) orderDetails+=`[${i+1}] ${date} ${time}\n${detail}\n`;
  });

  // Payment info
  const p1=document.getElementById('p1').checked;
  const p2=document.getElementById('p2').checked;
  let payment=p1?(currentLang==='ja'?'請求書払い（後払い）':'Invoice (pay later)'):p2?(currentLang==='ja'?'店頭払い':'Pay at store'):'';
  const invName=document.getElementById('in1').checked?'理化学研究所':document.getElementById('in2').checked?document.getElementById('in-inv-other').value:'';
  const invFormat=(document.getElementById('inv1').checked?'PDF（メール） ':'')+(document.getElementById('inv2').checked?document.getElementById('in-inv-format-other').value:'');

  const params={
    user_name:name,
    user_email:email,
    dept:dept,
    tel:tel,
    order_details:orderDetails||'（未入力）',
    food:food||'（なし）',
    payment:payment||'（未選択）',
    invoice_name:invName||'（なし）',
    invoice_format:invFormat||'（なし）',
    memo:memo||'（なし）'
  };

  const btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.textContent=currentLang==='ja'?'送信中...':'Sending...';

  try {
    // Send confirmation to customer
    await emailjs.send('service_10si8uf','template_hhcxk28',params);
    // Send notification to store
    await emailjs.send('service_10si8uf','template_dojv4p9',params);

    // Also submit to Formspree
    await fetch('https://formspree.io/f/mpqyogal',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(params)
    });

    alert(currentLang==='ja'?'ご注文を受け付けました。確認メールをお送りしましたのでご確認ください。':'Your order has been received. A confirmation email has been sent.');
    btn.textContent=currentLang==='ja'?'送信完了':'Sent';
  } catch(err){
    console.error(err);
    alert(currentLang==='ja'?'送信に失敗しました。時間をおいて再度お試しいただくか、直接お電話ください。（048-451-0153）':'Submission failed. Please try again or call us at 048-451-0153.');
    btn.disabled=false;
    btn.textContent=c.submit;
  }
});
</script>
